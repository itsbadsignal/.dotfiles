# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -g escape-time 0
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

### Monochrome Theme ###
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#000000,fg=#777777"

set -g status-left-length 30
set -g status-left "#[fg=#ffffff,bold] #S #[fg=#2a2a2a]│ "

set -g status-right-length 60
set -g status-right "#[fg=#444444]%d/%m  #[fg=#777777]%H:%M "

setw -g window-status-format "#[fg=#444444] #I:#W "
setw -g window-status-current-format "#[fg=#ffffff,bold] #I:#W "

set -g pane-border-style "fg=#1a1a1a"
set -g pane-active-border-style "fg=#2a2a2a"

set -g message-style "bg=#0d0d0d,fg=#ffffff"
set -g mode-style "bg=#1a1a1a,fg=#ffffff"
